terraform {
  required_providers {
    aws = {
      source  = "hashicorp/aws"
      version = "~> 5.0"
    }
  }
}

provider "aws" {
  region = "us-east-1"
}

############################
# S3 BUCKETS
############################

resource "aws_s3_bucket" "raw" {
  bucket = "datalake-raw-bucket-demo"
}

resource "aws_s3_bucket" "refined" {
  bucket = "datalake-refined-bucket-demo"
}

resource "aws_s3_bucket" "spec" {
  bucket = "datalake-spec-bucket-demo"
}

resource "aws_s3_bucket" "ml" {
  bucket = "datalake-ml-bucket-demo"
}

############################
# KINESIS
############################

resource "aws_kinesis_stream" "data_stream" {
  name             = "refined-stream"
  shard_count      = 1
  retention_period = 24
}

############################
# SNS
############################

resource "aws_sns_topic" "raw_topic" {
  name = "raw-topic"
}

############################
# IAM ROLE LAMBDA
############################

resource "aws_iam_role" "lambda_role" {
  name = "lambda_pipeline_role"

  assume_role_policy = jsonencode({
    Version = "2012-10-17"
    Statement = [{
      Action = "sts:AssumeRole"
      Principal = {
        Service = "lambda.amazonaws.com"
      }
      Effect = "Allow"
    }]
  })
}

############################
# LAMBDA
############################

resource "aws_lambda_function" "trigger_kinesis" {

  function_name = "lambda-send-kinesis"

  role = aws_iam_role.lambda_role.arn

  runtime = "python3.9"
  handler = "index.handler"

  filename         = "lambda.zip"
  source_code_hash = filebase64sha256("lambda.zip")

  environment {
    variables = {
      STREAM_NAME = aws_kinesis_stream.data_stream.name
    }
  }
}

############################
# SNS -> LAMBDA
############################

resource "aws_sns_topic_subscription" "lambda_sub" {

  topic_arn = aws_sns_topic.raw_topic.arn
  protocol  = "lambda"
  endpoint  = aws_lambda_function.trigger_kinesis.arn
}

############################
# IAM ROLE GLUE
############################

resource "aws_iam_role" "glue_role" {
  name = "glue-role"

  assume_role_policy = jsonencode({
    Version = "2012-10-17"
    Statement = [{
      Effect = "Allow"
      Principal = {
        Service = "glue.amazonaws.com"
      }
      Action = "sts:AssumeRole"
    }]
  })
}

############################
# GLUE JOB
############################

resource "aws_glue_job" "transform_job" {

  name     = "raw-to-refined-job"
  role_arn = aws_iam_role.glue_role.arn

  command {
    script_location = "s3://${aws_s3_bucket.raw.bucket}/scripts/glue-script.py"
    python_version  = "3"
  }

  glue_version = "4.0"
}

############################
# DMS
############################

resource "aws_dms_replication_instance" "dms_instance" {

  replication_instance_id = "dms-instance"

  replication_instance_class = "dms.t3.micro"

  allocated_storage = 20
}

############################
# ATHENA
############################

resource "aws_athena_workgroup" "athena_spec" {

  name = "spec-workgroup"

  configuration {

    result_configuration {

      output_location = "s3://${aws_s3_bucket.spec.bucket}/athena-results/"
    }
  }
}

############################
# IAM ROLE SAGEMAKER
############################

resource "aws_iam_role" "sagemaker_role" {

  name = "sagemaker-execution-role"

  assume_role_policy = jsonencode({

    Version = "2012-10-17"

    Statement = [{

      Effect = "Allow"

      Principal = {
        Service = "sagemaker.amazonaws.com"
      }

      Action = "sts:AssumeRole"
    }]
  })
}

############################
# SAGEMAKER NOTEBOOK
############################

resource "aws_sagemaker_notebook_instance" "ml_notebook" {

  name          = "ml-datalake-notebook"

  instance_type = "ml.t2.medium"

  role_arn = aws_iam_role.sagemaker_role.arn

  default_code_repository = null

  lifecycle_config_name = null

  direct_internet_access = "Enabled"

  root_access = "Enabled"
}
